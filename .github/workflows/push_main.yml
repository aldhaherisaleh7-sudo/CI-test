on:
  push:
    branches:
      - main
    paths:
      - "app/*"
  pull_request:
    branches:
      - main

jobs:
  testings:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup PHP
        uses: shivammathur/setup-php@v2
        with:
          php-version: 8.4

      - name: Install dependencies
        run: composer install --no-interaction --prefer-dist --optimize-autoloader

      - name: Run tests
        run: php artisan test --parallel
